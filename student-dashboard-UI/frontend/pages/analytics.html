<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics — Progressive Student Dashboard</title>
  <link rel="stylesheet" href="/frontend/css/style.css">
  <link rel="stylesheet" href="/frontend/css/components.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="app-layout">
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <aside id="sidebar" class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">PS</div>
        <span>ProgDash</span>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">Main</div>
          <a class="nav-item" href="/frontend/pages/student-dashboard.html">
            <span class="nav-icon">📊</span> Dashboard
          </a>
          <a class="nav-item" href="/frontend/pages/courses.html">
            <span class="nav-icon">📚</span> Courses
          </a>
          <a class="nav-item active" href="/frontend/pages/analytics.html">
            <span class="nav-icon">📈</span> Analytics
          </a>
          <a class="nav-item" href="/frontend/pages/recommendations.html">
            <span class="nav-icon">💡</span> Recommendations
          </a>
        </div>
        <div class="nav-section">
          <div class="nav-section-title">Account</div>
          <a class="nav-item" href="/frontend/pages/profile.html">
            <span class="nav-icon">👤</span> Profile
          </a>
          <a class="nav-item" href="/frontend/pages/export.html">
            <span class="nav-icon">📥</span> Export Reports
          </a>
        </div>
      </nav>
      <div class="sidebar-footer">
        <a class="nav-item logout-item" href="#" id="logout-btn">
          <span class="nav-icon">🚪</span> Logout
        </a>
      </div>
    </aside>

    <div class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="menu-toggle" id="menu-toggle">☰</button>
          <h1 class="page-title">Analytics</h1>
        </div>
        <div class="topbar-right">
          <div style="display:flex;gap:8px">
            <button class="btn btn-sm period-btn active" data-period="weekly" style="background:var(--bg-card);border:1px solid var(--glass-border);color:var(--text-primary);font-family:inherit;cursor:pointer;border-radius:var(--radius-sm);padding:6px 14px;font-weight:500">Weekly</button>
            <button class="btn btn-sm period-btn" data-period="monthly" style="background:var(--bg-card);border:1px solid var(--glass-border);color:var(--text-primary);font-family:inherit;cursor:pointer;border-radius:var(--radius-sm);padding:6px 14px;font-weight:500">Monthly</button>
          </div>
          <button class="profile-btn" onclick="window.location.href='/frontend/pages/profile.html'">
            <div class="profile-avatar" id="profile-avatar">?</div>
            <span class="profile-name" id="profile-name">User</span>
          </button>
        </div>
      </header>

      <div class="page-content">
        <div id="charts-row" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:24px">
          <div class="glass-card" id="activity-chart-container">
            <div class="glass-card-header">
              <div class="glass-card-title">Activity Trend</div>
            </div>
            <div class="chart-container">
              <canvas id="activityLineChart"></canvas>
            </div>
          </div>
          <div class="glass-card" id="completion-chart-container">
            <div class="glass-card-header">
              <div class="glass-card-title">Completed vs Pending</div>
            </div>
            <div class="chart-container chart-container-sm">
              <canvas id="completionDonutChart"></canvas>
            </div>
          </div>
          <div class="glass-card" id="course-chart-container" class="full-width">
            <div class="glass-card-header">
              <div class="glass-card-title">Course Progress</div>
            </div>
            <div class="chart-container">
              <canvas id="courseBarChart"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script type="module" src="/frontend/js/app.js"></script>
  <script type="module" src="/frontend/js/analytics.js"></script>
</body>
</html>
