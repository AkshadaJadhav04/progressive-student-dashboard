<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Progressive Student Dashboard</title>
  <link rel="stylesheet" href="/frontend/css/style.css">
  <link rel="stylesheet" href="/frontend/css/auth.css">
</head>
<body class="auth-page">
  <div class="auth-bg-shapes"></div>
  <div class="auth-container">
    <div class="auth-logo">
      <div class="auth-logo-icon">PS</div>
      <h1>Student Dashboard</h1>
      <p>Track your learning journey</p>
    </div>
    <div class="auth-card">
      <h2>Welcome back</h2>
      <p class="auth-subtitle">Sign in to your account</p>

      <div id="auth-alert"></div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="password-input-wrapper">
            <input type="password" class="form-input" id="password" placeholder="Enter your password" required>
            <button type="button" class="password-toggle" onclick="togglePassword()">👁</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">
          Sign In
        </button>
      </form>

      <div class="auth-divider">or continue with</div>

      <div style="display:flex;gap:8px">
        <div class="role-option active" data-role="student" onclick="selectRole(this)">🎓 Student</div>
        <div class="role-option" data-role="mentor" onclick="selectRole(this)">👨‍🏫 Mentor</div>
      </div>

      <div class="auth-footer">
        Don't have an account? <a href="/frontend/pages/register.html">Sign up</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { login, redirectAfterLogin } from '/frontend/js/auth.js';
    import { showToast } from '/frontend/js/utils.js';

    let selectedRole = 'student';

    window.selectRole = function(el) {
      document.querySelectorAll('.role-option').forEach(r => r.classList.remove('active'));
      el.classList.add('active');
      selectedRole = el.dataset.role;
    };

    window.togglePassword = function() {
      const pwd = document.getElementById('password');
      pwd.type = pwd.type === 'password' ? 'text' : 'password';
    };

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const user = await login(email, password);
        if (user.role !== selectedRole) {
          showToast(`This account is registered as ${user.role}, not ${selectedRole}`, 'error');
          import('/frontend/js/api.js').then(m => m.default.clearTokens());
          btn.disabled = false;
          btn.textContent = 'Sign In';
          return;
        }
        showToast('Welcome back!', 'success');
        redirectAfterLogin(user);
      } catch (err) {
        document.getElementById('auth-alert').innerHTML = `<div class="alert alert-error">${err.message}</div>`;
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });

    if (localStorage.getItem('access_token')) {
      window.location.href = '/frontend/pages/student-dashboard.html';
    }
  </script>
</body>
</html>
