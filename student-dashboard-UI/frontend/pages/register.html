<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Progressive Student Dashboard</title>
  <link rel="stylesheet" href="/frontend/css/style.css">
  <link rel="stylesheet" href="/frontend/css/auth.css">
</head>
<body class="auth-page">
  <div class="auth-bg-shapes"></div>
  <div class="auth-container">
    <div class="auth-logo">
      <div class="auth-logo-icon">PS</div>
      <h1>Student Dashboard</h1>
      <p>Start your learning journey</p>
    </div>
    <div class="auth-card">
      <h2>Create account</h2>
      <p class="auth-subtitle">Join as a student or mentor</p>

      <div id="auth-alert"></div>

      <form id="register-form">
        <div class="role-toggle">
          <button type="button" class="role-option active" data-role="student" onclick="selectRole(this)">🎓 Student</button>
          <button type="button" class="role-option" data-role="mentor" onclick="selectRole(this)">👨‍🏫 Mentor</button>
        </div>

        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-input" id="username" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="password-input-wrapper">
            <input type="password" class="form-input" id="password" placeholder="Min 6 characters" minlength="6" required>
            <button type="button" class="password-toggle" onclick="togglePassword()">👁</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Bio <span style="color:var(--text-muted)">(optional)</span></label>
          <textarea class="form-input form-textarea" id="bio" placeholder="Tell us about yourself"></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" id="register-btn">
          Create Account
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="/frontend/pages/login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { register, redirectAfterLogin } from '/frontend/js/auth.js';
    import { showToast } from '/frontend/js/utils.js';

    let selectedRole = 'student';

    window.selectRole = function(el) {
      document.querySelectorAll('.role-option').forEach(r => r.classList.remove('active'));
      el.classList.add('active');
      selectedRole = el.dataset.role;
    };

    window.togglePassword = function() {
      const pwd = document.getElementById('password');
      pwd.type = pwd.type === 'password' ? 'text' : 'password';
    };

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const bio = document.getElementById('bio').value;
      const btn = document.getElementById('register-btn');
      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        const user = await register(email, username, password, selectedRole);
        showToast('Account created!', 'success');
        redirectAfterLogin(user);
      } catch (err) {
        document.getElementById('auth-alert').innerHTML = `<div class="alert alert-error">${err.message}</div>`;
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });

    if (localStorage.getItem('access_token')) {
      window.location.href = '/frontend/pages/student-dashboard.html';
    }
  </script>
</body>
</html>
